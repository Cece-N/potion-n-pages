<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Potion &amp; Pages</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    .card-back {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border: 2px solid #c9a961;
      box-shadow: 0 0 20px rgba(201, 169, 97, 0.3);
    }
    .card-front {
      background: linear-gradient(180deg, #fdf6e3 0%, #f5e6c8 100%);
      border: 2px solid #c9a961;
    }
    .card-container {
      perspective: 1000px;
    }
    .card-inner {
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }
    .card-inner.flipped {
      transform: rotateY(180deg);
    }
    .card-face {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      position: absolute;
      inset: 0;
      border-radius: 12px;
    }
    .card-face-back {
      transform: rotateY(0deg);
    }
    .card-face-front {
      transform: rotateY(180deg);
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes sparkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    .star { animation: sparkle 2s ease-in-out infinite; }
    .floating { animation: float 3s ease-in-out infinite; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up {
      animation: fadeUp 0.6s ease-out forwards;
      opacity: 0;
    }

    /* Rider-Waite card style */
    .rw-card-svg {
      image-rendering: crisp-edges;
    }
  </style>
</head>

    <!-- Stars background -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden" id="stars-bg"></div>

        <button onclick="setSpread(1)" id="btn-1" class="spread-btn px-4 py-2 rounded-full text-sm transition-all" style="border: 1px solid #c9a961; color: #c9a961; background: transparent;">Single Card</button>

        Draw Cards

// ─── RIDER-WAITE STYLE SVG ILLUSTRATIONS ───────────────────────────────────────
// Each card gets a miniature hand-drawn-style illustration inspired by the Smith-Waite deck.
function getCardSVG(card) {
  const suitPalette = {
    major:     { bg: "#f5edd8", border: "#6b4f1a", ink: "#6b4f1a" },
    wands:     { bg: "#f5edd8", border: "#7a3a10", ink: "#7a3a10" },
    cups:      { bg: "#f5edd8", border: "#1e3f7a", ink: "#1e3f7a" },
    swords:    { bg: "#f5edd8", border: "#2e4a5a", ink: "#2e4a5a" },
    pentacles: { bg: "#f5edd8", border: "#2d5016", ink: "#2d5016" },
  };
  const p = suitPalette[card.suit] || suitPalette.major;

  const k = p.ink;

  // Card shell — parchment bg, double border, numeral + name
  const open = () => `<svg width="140" height="220" viewBox="0 0 140 220" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="140" height="220" rx="6" fill="${p.bg}"/>
    <rect x="3" y="3" width="134" height="214" rx="4" fill="none" stroke="${k}" stroke-width="1.8"/>
    <rect x="8" y="8" width="124" height="204" rx="2" fill="none" stroke="${k}" stroke-width="0.5" stroke-dasharray="2,3"/>
    <text x="70" y="21" font-size="8" text-anchor="middle" fill="${k}" font-family="serif" font-weight="bold">${card.numeral}</text>
    <text x="70" y="214" font-size="7" text-anchor="middle" fill="${k}" font-family="serif">${card.name}</text>`;
  const close = `</svg>`;

  // ── MAJOR ARCANA ──
  if (card.name === "The Fool") return open() + `
    <!-- sky -->
    <rect x="8" y="24" width="124" height="90" fill="${p.sky}"/>
    <!-- mountains -->
    <polygon points="8,114 40,60 72,114" fill="#ccc"/>
    <polygon points="50,114 85,70 120,114" fill="#bbb"/>
    <!-- ground -->
    <rect x="8" y="114" width="124" height="78" fill="#d4b896"/>
    <!-- cliff edge -->
    <path d="M8 150 Q30 140 55 155 Q70 162 90 148 Q110 138 132 145 L132 114 L8 114Z" fill="#c8a870"/>
    <!-- figure (fool) -->
    <rect x="55" y="90" width="10" height="30" rx="2" fill="#8b4513"/><!-- body -->
    <circle cx="60" cy="86" r="7" fill="#f5deb3"/><!-- head -->
    <line x1="60" y1="100" x2="75" y2="92" stroke="#8b4513" stroke-width="2"/><!-- staff arm -->
    <line x1="75" y1="92" x2="85" y2="85" stroke="#8b4513" stroke-width="1.5"/><!-- staff -->
    <circle cx="85" cy="83" r="3" fill="#cc8800"/><!-- bundle -->
    <line x1="60" y1="100" x2="50" y2="106" stroke="#8b4513" stroke-width="2"/><!-- other arm -->
    <line x1="60" y1="120" x2="55" y2="138" stroke="#8b4513" stroke-width="2"/><!-- leg -->
    <line x1="60" y1="120" x2="68" y2="136" stroke="#8b4513" stroke-width="2"/><!-- leg -->
    <!-- dog -->
    <ellipse cx="48" cy="128" rx="8" ry="5" fill="#daa520"/>
    <circle cx="42" cy="124" r="4" fill="#daa520"/>
    <!-- flower -->
    <line x1="55" y1="100" x2="45" y2="94" stroke="#228b22" stroke-width="1"/>
    <circle cx="44" cy="92" r="3" fill="#fff"/>
    <!-- sun -->
    <circle cx="110" cy="40" r="14" fill="#ffd700" opacity="0.8"/>
    <circle cx="110" cy="40" r="10" fill="#ffec00"/>
  ` + close;

  if (card.name === "The Magician") return open() + `
    <rect x="8" y="24" width="124" height="80" fill="${p.sky}"/>
    <rect x="8" y="104" width="124" height="88" fill="#d4b896"/>
    <!-- roses top -->
    <circle cx="25" cy="35" r="5" fill="#c83232"/>
    <circle cx="40" cy="30" r="4" fill="#c83232"/>
    <circle cx="105" cy="35" r="5" fill="#c83232"/>
    <circle cx="118" cy="30" r="4" fill="#c83232"/>
    <!-- table -->
    <rect x="40" y="110" width="60" height="5" rx="2" fill="#8b6914"/>
    <line x1="45" y1="115" x2="45" y2="130" stroke="#8b6914" stroke-width="2"/>
    <line x1="95" y1="115" x2="95" y2="130" stroke="#8b6914" stroke-width="2"/>
    <!-- tools on table -->
    <rect x="48" y="103" width="8" height="9" rx="1" fill="#ffd700"/><!-- wand -->
    <rect x="60" y="104" width="6" height="7" fill="#2255a4"/><!-- cup -->
    <polygon points="72,103 75,112 69,112" fill="#c0c0c0"/><!-- sword -->
    <circle cx="83" cy="107" r="4" fill="#228b22"/><!-- pentacle -->
    <!-- figure -->

    <circle cx="70" cy="64" r="8" fill="#f5deb3"/><!-- head -->
    <line x1="70" y1="64" x2="70" y2="56" stroke="#ffd700" stroke-width="2"/><!-- wand raised -->
    <circle cx="70" cy="54" r="3" fill="#ffd700"/>
    <!-- infinity symbol over head -->
    <path d="M58 50 Q62 45 66 50 Q70 55 74 50 Q78 45 82 50" fill="none" stroke="${p.border}" stroke-width="1.5"/>

  if (card.name === "The High Priestess") return open() + `
    <rect x="8" y="24" width="124" height="168" fill="#1a1a3e"/>
    <!-- pillars -->
    <rect x="12" y="40" width="18" height="120" rx="3" fill="#2a2a4a"/>

    <path d="M30 50 Q50 60 70 50 Q90 40 110 50" fill="#1a3388" opacity="0.8"/>
    <!-- moon -->
    <circle cx="70" cy="58" r="14" fill="#c0c0c0" opacity="0.7"/>
    <circle cx="76" cy="54" r="10" fill="#1a1a3e"/>
    <!-- figure -->
    <rect x="52" y="90" width="36" height="50" rx="4" fill="#e8e8ff"/><!-- robe -->
    <circle cx="70" cy="84" r="9" fill="#f5deb3"/><!-- head -->
    <!-- cross on chest -->
    <line x1="70" y1="97" x2="70" y2="107" stroke="#ffd700" stroke-width="2"/>
    <line x1="65" y1="102" x2="75" y2="102" stroke="#ffd700" stroke-width="2"/>
    <!-- scroll -->
    <rect x="62" y="108" width="16" height="20" rx="1" fill="#fdf6e3"/>
    <text x="70" y="119" font-size="5" text-anchor="middle" fill="#333" font-family="serif">TORA</text>
    <!-- crown crescent -->

    <ellipse cx="42" cy="148" rx="12" ry="7" fill="#eee"/>
    <circle cx="32" cy="143" r="6" fill="#eee"/>
    <ellipse cx="98" cy="148" rx="12" ry="7" fill="#333"/>
    <circle cx="108" cy="143" r="6" fill="#333"/>
  ` + close;

  // ── MINOR ARCANA – WANDS ──
  if (card.suit === "wands") return open() + `
    <rect x="8" y="24" width="124" height="168" fill="#e8d8a0"/>
    <!-- earthy landscape -->
    <rect x="8" y="140" width="124" height="52" fill="#8b6914" opacity="0.5"/>
    <path d="M8 140 Q35 132 70 138 Q100 143 132 132 L132 140 L8 140Z" fill="#7a5c10" opacity="0.7"/>
    <!-- wands / rods motif: draw N wands -->
    ${(() => {
      const n = ["A","II","III","IV","V","VI","VII","VIII","IX","X"].indexOf(card.numeral)+1 || 1;
      const positions = [
        [[70,80]],
        [[52,80],[88,80]],
        [[38,80],[70,70],[102,80]],
        [[35,80],[55,75],[85,75],[105,80]],
        [[30,80],[48,68],[70,80],[92,68],[110,80]],
        [[25,80],[43,70],[61,80],[79,70],[97,80],[115,80]],
        [[22,78],[38,68],[54,78],[70,68],[86,78],[102,68],[118,78]],
        [[20,82],[34,70],[48,82],[62,70],[76,82],[90,70],[104,82],[118,70]],
        [[18,82],[30,70],[42,82],[54,70],[66,82],[78,70],[90,82],[102,70],[114,82]],
        [[16,85],[26,72],[36,85],[46,72],[56,85],[66,72],[76,85],[86,72],[96,85],[106,72]],
      ];
      const pts = positions[Math.min(n,10)-1] || positions[0];
      return pts.map(([x,y])=>`
        <line x1="${x}" y1="${y+30}" x2="${x}" y2="${y-30}" stroke="#8b4513" stroke-width="3"/>
        <circle cx="${x}" cy="${y-32}" r="4" fill="#228b22"/>
        <circle cx="${x}" cy="${y+32}" r="3" fill="#228b22"/>
        <line x1="${x-6}" y1="${y-20}" x2="${x-14}" y2="${y-26}" stroke="#228b22" stroke-width="1.5"/>
        <line x1="${x+6}" y1="${y-20}" x2="${x+14}" y2="${y-26}" stroke="#228b22" stroke-width="1.5"/>
      `).join('');
    })()}
    <!-- suit symbol bottom -->
    <text x="70" y="178" font-size="10" text-anchor="middle" fill="#8b4513" font-family="serif">🔥</text>
  ` + close;

  // ── MINOR ARCANA – CUPS ──
  if (card.suit === "cups") return open() + `
    <rect x="8" y="24" width="124" height="168" fill="#c8d8f0"/>
    <!-- water background -->
    <rect x="8" y="145" width="124" height="47" fill="#4488aa" opacity="0.4"/>
    <path d="M8 145 Q35 138 70 144 Q100 149 132 138 L132 145 L8 145Z" fill="#3399aa" opacity="0.5"/>
    <!-- cups / chalices -->
    ${(() => {
      const n = ["A","II","III","IV","V","VI","VII","VIII","IX","X"].indexOf(card.numeral)+1 || 1;
      const positions = [
        [[70,90]],
        [[48,90],[92,90]],
        [[34,90],[70,82],[106,90]],
        [[30,90],[52,84],[88,84],[110,90]],
        [[22,90],[42,78],[70,90],[98,78],[118,90]],
        [[20,90],[40,80],[60,90],[80,80],[100,90],[120,90]],
        [[18,86],[34,76],[52,86],[70,76],[88,86],[104,76],[122,86]],
        [[16,88],[30,76],[44,88],[58,76],[72,88],[86,76],[100,88],[114,76]],
        [[14,88],[26,76],[38,88],[50,76],[62,88],[74,76],[86,88],[98,76],[110,88]],
        [[12,90],[24,78],[36,90],[48,78],[60,90],[72,78],[84,90],[96,78],[108,90],[120,78]],
      ];
      const pts = positions[Math.min(n,10)-1] || positions[0];
      return pts.map(([x,y])=>`
        <path d="M${x-7} ${y-8} Q${x-8} ${y+8} ${x-4} ${y+12} L${x+4} ${y+12} Q${x+8} ${y+8} ${x+7} ${y-8}Z" fill="#2255a4" opacity="0.85"/>
        <ellipse cx="${x}" cy="${y-8}" rx="7" ry="3" fill="#3366cc"/>
        <line x1="${x-4}" y1="${y+12}" x2="${x+4}" y2="${y+12}" stroke="#1a3a80" stroke-width="1.5"/>
        <line x1="${x}" y1="${y+12}" x2="${x}" y2="${y+18}" stroke="#1a3a80" stroke-width="1.5"/>
        <ellipse cx="${x}" cy="${y+18}" rx="5" ry="2" fill="#1a3a80"/>
        <!-- water overflow -->
        <path d="M${x-7} ${y-8} Q${x} ${y-18} ${x+7} ${y-8}" fill="#88bbdd" opacity="0.5"/>
      `).join('');
    })()}
  ` + close;

  // ── MINOR ARCANA – SWORDS ──
  if (card.suit === "swords") return open() + `
    <rect x="8" y="24" width="124" height="168" fill="#c0c8d8"/>
    <!-- cloudy sky -->
    <ellipse cx="35" cy="50" rx="22" ry="12" fill="#e0e8f0" opacity="0.8"/>
    <ellipse cx="70" cy="44" rx="28" ry="14" fill="#e8f0f8" opacity="0.8"/>
    <ellipse cx="105" cy="52" rx="20" ry="11" fill="#e0e8f0" opacity="0.8"/>
    <!-- ground -->
    <rect x="8" y="158" width="124" height="34" fill="#a0a878" opacity="0.7"/>
    <!-- swords -->
    ${(() => {
      const n = ["A","II","III","IV","V","VI","VII","VIII","IX","X"].indexOf(card.numeral)+1 || 1;
      const positions = [
        [[70,100]],
        [[52,100],[88,100]],
        [[38,100],[70,92],[102,100]],
        [[30,100],[54,92],[86,92],[110,100]],
        [[24,100],[44,88],[70,100],[96,88],[116,100]],
        [[20,100],[38,88],[58,100],[82,88],[102,100],[120,100]],
        [[16,98],[32,86],[50,98],[68,86],[86,98],[104,86],[122,98]],
        [[14,98],[28,86],[42,98],[56,86],[70,98],[84,86],[98,98],[112,86]],
        [[12,98],[24,86],[36,98],[48,86],[60,98],[72,86],[84,98],[96,86],[108,98]],
        [[10,98],[22,86],[34,98],[46,86],[58,98],[70,86],[82,98],[94,86],[106,98],[118,86]],
      ];
      const pts = positions[Math.min(n,10)-1] || positions[0];
      return pts.map(([x,y])=>`
        <polygon points="${x},${y-38} ${x-2},${y+30} ${x+2},${y+30}" fill="#aabbcc"/>
        <polygon points="${x},${y-38} ${x-2},${y-32} ${x+2},${y-32}" fill="#e0e8f0"/>
        <line x1="${x-10}" y1="${y+28}" x2="${x+10}" y2="${y+28}" stroke="#8899aa" stroke-width="2"/>
        <rect x="${x-2}" y="${y+28}" width="4" height="6" fill="#aa8833"/>
      `).join('');
    })()}
  ` + close;

  // ── MINOR ARCANA – PENTACLES ──
  if (card.suit === "pentacles") return open() + `
    <rect x="8" y="24" width="124" height="168" fill="#d0e8c0"/>
    <!-- landscape -->
    <rect x="8" y="148" width="124" height="44" fill="#5c8a3c" opacity="0.8"/>
    <path d="M8 148 Q40 140 70 148 Q100 155 132 142 L132 148 L8 148Z" fill="#4a7230" opacity="0.7"/>
    <!-- pentacles (5-pointed stars in circles) -->
    ${(() => {
      const n = ["A","II","III","IV","V","VI","VII","VIII","IX","X"].indexOf(card.numeral)+1 || 1;
      const positions = [
        [[70,100]],
        [[48,100],[92,100]],
        [[34,100],[70,88],[106,100]],
        [[30,100],[54,90],[86,90],[110,100]],
        [[22,100],[44,86],[70,100],[96,86],[118,100]],
        [[18,100],[40,88],[62,100],[78,88],[100,100],[122,100]],
        [[16,96],[34,84],[52,96],[70,84],[88,96],[106,84],[124,96]],
        [[14,96],[28,84],[42,96],[56,84],[70,96],[84,84],[98,96],[112,84]],
        [[12,96],[24,84],[36,96],[48,84],[60,96],[72,84],[84,96],[96,84],[108,96]],
        [[10,96],[22,84],[34,96],[46,84],[58,96],[70,84],[82,96],[94,84],[106,96],[118,84]],
      ];
      const pts = positions[Math.min(n,10)-1] || positions[0];
      const r = n > 6 ? 10 : 13;
      return pts.map(([x,y])=>`
        <circle cx="${x}" cy="${y}" r="${r}" fill="none" stroke="#557722" stroke-width="1.5"/>
        <polygon points="${x},${y-r+3} ${x+2.4},${y-0.8} ${x+r*0.85-1},${y-r*0.31+1} ${x+1.5},${y+r*0.5-1} ${x+r*0.53},${y+r*0.81-1} ${x-r*0.53},${y+r*0.81-1} ${x-1.5},${y+r*0.5-1} ${x-r*0.85+1},${y-r*0.31+1} ${x-2.4},${y-0.8}" fill="#daa520" stroke="#557722" stroke-width="1"/>
      `).join('');
    })()}
  ` + close;

  // Fallback for any other major arcana not individually drawn
  return open() + `
    <rect x="8" y="24" width="124" height="168" fill="${p.sky}"/>
    <circle cx="70" cy="95" r="35" fill="none" stroke="${p.border}" stroke-width="2" opacity="0.5"/>
    <circle cx="70" cy="95" r="20" fill="${p.border}" opacity="0.15"/>
    <polygon points="70,65 75,85 95,85 80,97 86,117 70,105 54,117 60,97 45,85 65,85" fill="${p.border}" opacity="0.6"/>
    <text x="70" y="158" font-size="11" text-anchor="middle" fill="${p.border}" font-family="serif">${card.numeral}</text>
  ` + close;
}

// ─── STATE ──────────────────────────────────────────────────────────────────────
let currentSpread = 1;
let drawnCards = [];

function setSpread(n) {
  currentSpread = n;
  document.querySelectorAll('.spread-btn').forEach(btn => {
    btn.style.border = '1px solid rgba(201,169,97,0.4)';
    btn.style.color  = 'rgba(201,169,97,0.6)';
  });
  const active = document.getElementById('btn-' + n);
  if (active) {
    active.style.border = '1px solid #c9a961';
    active.style.color  = '#c9a961';
  }
}

// ─── DRAW CARDS ─────────────────────────────────────────────────────────────────
function drawCards() {
  const area    = document.getElementById('cards-area');
  const reading = document.getElementById('reading-area');
  area.innerHTML    = '';
  reading.innerHTML = '';
  showAgainBtn(false);

  const shuffled = [...tarotDeck].sort(() => Math.random() - 0.5);
  drawnCards = shuffled.slice(0, currentSpread);
  const labels = currentSpread === 3 ? ['Past', 'Present', 'Future'] : ['Your Card'];

  drawnCards.forEach((card, i) => {
    const container = document.createElement('div');
    container.className = 'card-container cursor-pointer fade-up';
    container.style.animationDelay = (i * 0.2) + 's';
    container.style.width  = '160px';
    container.style.height = '260px';

    container.innerHTML = `
      <div class="card-inner w-full h-full relative" id="card-${i}">
        <!-- BACK FACE -->
        <div class="card-face card-face-back card-back flex flex-col items-center justify-center p-4">
          <svg width="60" height="60" viewBox="0 0 60 60" style="color:#c9a961;" class="mx-auto mb-3">
            <polygon points="30,5 35,20 50,20 38,30 42,45 30,36 18,45 22,30 10,20 25,20" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="30" cy="30" r="25" fill="none" stroke="currentColor" stroke-width="0.8" stroke-dasharray="3,3"/>
          </svg>
          <p class="text-xs" style="color:#c9a961; font-family:'Cinzel Decorative',serif;">${labels[i]}</p>
        </div>
        <!-- FRONT FACE -->
        <div class="card-face card-face-front card-front flex flex-col items-center p-2 overflow-hidden">
          <div style="flex:1; display:flex; align-items:center; justify-content:center;">
            ${getCardSVG(card)}
          </div>
        </div>
      </div>`;

    container.addEventListener('click', () => flipCard(i));
    area.appendChild(container);
  });

  // Auto-reveal reading after cards have animated in
  setTimeout(() => showReading(), currentSpread * 200 + 1200);

  // Show the button immediately so it's always accessible
  showAgainBtn(true);
}

function flipCard(index) {
  const card = document.getElementById('card-' + index);
  if (card) card.classList.toggle('flipped');
}

// ─── READING TEXT ────────────────────────────────────────────────────────────────
function showReading() {
  const reading = document.getElementById('reading-area');
  const labels  = currentSpread === 3 ? ['Past', 'Present', 'Future'] : ['Guidance'];

  let html = '<div class="fade-up" style="animation-delay:0.2s;">';
  html += '<h2 class="text-2xl font-bold mb-6" style="font-family:\'Cinzel Decorative\',serif; color:#c9a961;">Your Reading</h2>';

  drawnCards.forEach((card, i) => {
    html += `
      <div class="mb-6 p-5 rounded-xl fade-up" style="animation-delay:${0.3 + i * 0.2}s; background:rgba(201,169,97,0.08); border:1px solid rgba(201,169,97,0.2);">
        <p class="text-xs uppercase tracking-widest mb-1" style="color:#a07c3a;">${labels[i]}</p>
        <h3 class="text-xl font-bold mb-2" style="color:#c9a961; font-family:'Cinzel Decorative',serif;">${card.name}</h3>
        <p class="text-base italic leading-relaxed" style="color:#cbd5e0;">${card.meaning}</p>
      </div>`;
  });

  html += '<p class="text-sm mt-6 mb-8" style="color:rgba(160,174,192,0.6);">Tap any card to flip it</p>';
  html += '</div>';
  reading.innerHTML = html;

  // Flip cards sequentially

  showAgainBtn(true);

  // Flip cards sequentially
  drawnCards.forEach((_, i) => setTimeout(() => flipCard(i), i * 350));
}

// ─── STARS ───────────────────────────────────────────────────────────────────────
(function generateStars() {
  const container = document.getElementById('stars-bg');
  for (let i = 0; i < 60; i++) {
    const star = document.createElement('div');
    star.className = 'star absolute rounded-full';
    const sz = Math.random() * 2 + 1;
    star.style.cssText = `width:${sz}px;height:${sz}px;background:#c9a961;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;`;
    container.appendChild(star);
  }
})();

function showAgainBtn(visible) {
  const btn = document.getElementById('again-btn-area');
  if (!btn) return;
  btn.style.display = visible ? 'flex' : 'none';
  if (visible) btn.style.justifyContent = 'center';
}

function resetReading() {
  document.getElementById('cards-area').innerHTML = '';
  document.getElementById('reading-area').innerHTML = '';
  showAgainBtn(false);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Init spread buttons
setSpread(1);
  </script>
</body>
</html>
